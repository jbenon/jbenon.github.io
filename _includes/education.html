{% assign education = site.data.data.education %}
{% if education %}
<section class="baseitem">
    <h2 class="title">Education</h2>
    {% for exp in education %}
        <div class="item">
            <div class="itemtitle">
                {{exp.itemtitle}}
            </div>
            <div class="place">
                {{exp.place}} 
                <span class="time">{{exp.time}}</span>
            </div> 
            <div class="details">{{exp.details}}</div>
        </div>
       
    {% endfor %}
</section>
{% endif %}
