{% assign awards = site.data.data.awards %}
{% if awards %}
<section class="experience">
    <h2 class="title">Fundings and awards</h2>
    {% for exp in awards %}
        <div class="experience-item">
            <div class="role">
                {{exp.item-title}}
            </div>
            <div class="company">
                {{exp.place}} 
                <span class="time">{{exp.time}}</span>
            </div> 
            <div class="details">{{exp.details}}</div>
        </div>
       
    {% endfor %}
</section>
{% endif %}
