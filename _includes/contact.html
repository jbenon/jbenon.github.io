{% assign contact = site.data.data.contact %}
{% if contact %}
<section class="contact">
    {% if contact.email %}
        <div class="contact-item">
            <a href="mailto:{{contact.email}}">
                <i data-feather="mail"></i>
            </a>
            <a href="mailto:{{contact.email}}">
                {{contact.email}}
            </a>
        </div>
    {% endif %}

</section>
{% endif %}
